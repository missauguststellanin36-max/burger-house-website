<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Burger House</title>
    <link rel="icon" href="images/icon.jpg" type="image/jpeg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">Burger House</div>
        <input type="checkbox" id="menu-toggle">
        <label for="menu-toggle" class="hamburger"></label>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="menu.html">Menu</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="reviews.html">Reviews</a></li>
        </ul>
    </nav>

    <section class="contact" id="contact">
        <h2>Contact Us</h2>
        <div class="contact-container">
            <form>
                <input type="text" placeholder="Your Name">
                <input type="email" placeholder="Your Email">
                <input type="tel" placeholder="Your Phone Number">
                <textarea rows="5" placeholder="Your Message"></textarea>
                <button type="submit">Send Message</button>
            </form>
            <div class="contact-info">
                <div class="info-item">
                    <h3>Phone</h3>
                    <p>+ (885) 123-4567</p>
                </div>
                <div class="info-item">
                    <h3>Email</h3>
                    <p><a href="mailto:info@burgerhouse.com">info@burgerhouse.com</a></p>
                </div>
                <div class="info-item">
                    <h3>Address</h3>
                    <p>123 Main Street, City, State 12345</p>
                </div>
                <div class="info-item">
                    <h3>Follow Us</h3>
                    <p>
                        <a href="https://facebook.com/burgerhouse" target="_blank">Facebook</a> | 
                        <a href="https://instagram.com/burgerhouse" target="_blank">Instagram</a>
                    </p>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <p>© 2026 Burger House. All Rights Reserved.</p>
    </footer>
</body>
</html>
